parameters:
  repository: aa8y/spark
  platforms: linux/amd64,linux/arm64
structureTest:
  configs:
    - test/config/common.yaml
    - test/config/version.yaml
    - test/config/sparkpi.yaml
contexts:
  stable:
    templates:
      # build loads a single-arch image into the local daemon so CST can run
      # it on the same runner. CI per-arch matrix sets $PLATFORM; locally it
      # stays unset and buildx picks the host arch.
      build: >
        docker buildx build --load ${PLATFORM:+--platform "$PLATFORM"}
        -t {{{repository}}}:{{tag}}
        --build-arg HADOOP_VERSION={{hadoop_version}}
        --build-arg JDK_VERSION={{jdk_version}}
        --build-arg SPARK_HADOOP_PROFILE={{spark_hadoop_profile}}
        --build-arg SPARK_VERSION={{spark_version}}
        {{context}}
      # push does the real multi-arch build + push to the registry in one
      # buildx call. No `dave build` output is reused — buildx rebuilds for
      # every platform listed in `platforms`.
      push: >
        docker buildx build --push --platform {{{platforms}}}
        -t {{{repository}}}:{{tag}}
        --build-arg HADOOP_VERSION={{hadoop_version}}
        --build-arg JDK_VERSION={{jdk_version}}
        --build-arg SPARK_HADOOP_PROFILE={{spark_hadoop_profile}}
        --build-arg SPARK_VERSION={{spark_version}}
        {{context}}
    tag_keys:
      - spark_version
    tags:
      '2.4.8':
        hadoop_version: 2.7.7
        jdk_version: '8'
        spark_hadoop_profile: hadoop2.7
      '3.5.8':
        hadoop_version: 3.3.6
        jdk_version: '17'
        spark_hadoop_profile: hadoop3
      '2.4':
        hadoop_version: 2.7.7
        jdk_version: '8'
        spark_hadoop_profile: hadoop2.7
        spark_version: 2.4.8
      '3.5':
        hadoop_version: 3.3.6
        jdk_version: '17'
        spark_hadoop_profile: hadoop3
        spark_version: 3.5.8
      '3':
        hadoop_version: 3.3.6
        jdk_version: '17'
        spark_hadoop_profile: hadoop3
        spark_version: 3.5.8
      'latest':
        hadoop_version: 3.3.6
        jdk_version: '17'
        spark_hadoop_profile: hadoop3
        spark_version: 3.5.8
